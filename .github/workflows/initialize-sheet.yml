name: Initialize Google Sheet

on:
  workflow_dispatch:
    inputs:
      spreadsheet_id:
        description: "共有済みの空のGoogleスプレッドシートID"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: initialize-sheet-${{ inputs.spreadsheet_id }}
  cancel-in-progress: false

jobs:
  initialize:
    runs-on: ubuntu-latest
    environment: administration
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Google integration
        run: python -m pip install -e '.[google]'
      - name: Initialize workbook
        env:
          CE_SPREADSHEET_ID: ${{ inputs.spreadsheet_id }}
        run: python -m ce_seminar_finder.cli init-sheet --spreadsheet-id "$CE_SPREADSHEET_ID"
